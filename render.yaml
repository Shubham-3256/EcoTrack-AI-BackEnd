databases:
  - name: ecotrack-db
    plan: free
    databaseName: ecotrack
    user: ecotrack_user

services:
  - type: web
    name: ecotrack-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production

      - key: JWT_SECRET
        generateValue: true

      - key: ALLOWED_ORIGINS
        value: eco-track-ai-front-end.vercel.app   # ← replace after Vercel deploy

      - key: DATABASE_URL
        fromDatabase:
          name: ecotrack-db          # auto-injected — no copy-paste needed
          property: connectionString

      - key: PYTHON_VERSION
        value: 3.11.0

      # Add these manually in Render dashboard (keep secrets out of git):
      # ANTHROPIC_API_KEY = sk-ant-...
      # RESEND_API_KEY    = re_...