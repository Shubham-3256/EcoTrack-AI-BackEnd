databases:
  - name: ecotrack-db
    plan: free
    databaseName: ecotrack
    user: ecotrack_user

services:
  - type: web
    name: ecotrack-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production

      - key: JWT_SECRET
        generateValue: true

      - key: ALLOWED_ORIGINS
        value: https://eco-track-ai-front-end.vercel.app

      - key: DATABASE_URL
        fromDatabase:
          name: ecotrack-db
          property: connectionString

      - key: PYTHON_VERSION
        value: 3.11.9

      # Add these manually in Render dashboard. Keep secrets out of git.
      # FIREBASE_SERVICE_ACCOUNT
      # OPENAI_API_KEY
      # RESEND_API_KEY
